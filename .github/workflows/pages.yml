name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      rebuild_missing_from_source:
        description: "Rebuild missing successful runs from commit SHA (slow, for backfill)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_rebuilds:
        description: "Max missing builds to rebuild when backfill is enabled"
        required: false
        default: "30"

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ⭐ ADD THIS
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - run: npm ci
      - run: npm run build
      - name: Assemble versioned site artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_WORKFLOW_FILE: pages.yml
          MAX_BUILDS: "30"
          REBUILD_MISSING_FROM_SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rebuild_missing_from_source || 'false' }}
          MAX_REBUILDS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_rebuilds || '0' }}
        run: node scripts/assemble-versioned-site.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages
          retention-days: 90

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
